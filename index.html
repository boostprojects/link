<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETPULSE — ТВОЙ ЗВУК. ТВОИ ПРАВИЛА.</title>
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #ff0000;
            --black: #000000;
            --gray: #1a1a1a;
        }
        body {
            background-color: var(--black);
            color: white;
            font-family: 'Dela Gothic One', sans-serif;
            margin: 0;
            text-transform: uppercase;
        }
        
        /* Навигация */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--red);
        }
        .logo { font-size: 1.8rem; color: var(--red); }

        /* Hero секция */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            background: radial-gradient(circle, #2a0000 0%, #000000 80%);
        }
        .hero h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            line-height: 0.8;
            margin: 0;
            color: white;
        }
        .hero span { color: var(--red); }
        
        .cta-box {
            margin-top: 40px;
        }
        .btn-main {
            background: var(--red);
            color: white;
            padding: 20px 50px;
            text-decoration: none;
            font-size: 1.5rem;
            transition: 0.2s;
            display: inline-block;
            border: none;
        }
        .btn-main:hover {
            background: white;
            color: var(--red);
            transform: scale(1.05) skew(-5deg);
        }

        /* Секция инфо */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2px;
            background: var(--red);
            border-top: 2px solid var(--red);
            border-bottom: 2px solid var(--red);
        }
        .grid-item {
            background: var(--black);
            padding: 60px 40px;
            transition: 0.3s;
        }
        .grid-item:hover { background: var(--gray); }
        .grid-item h2 { color: var(--red); font-size: 2rem; margin-bottom: 15px; }
        .grid-item p { font-family: sans-serif; text-transform: none; color: #ccc; line-height: 1.6; }

        footer {
            padding: 50px;
            text-align: center;
            font-size: 0.9rem;
            color: #444;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">NETPULSE</div>
    <div style="font-family: sans-serif; font-weight: bold;">[ ПРЯМАЯ ДИСТРИБУЦИЯ ]</div>
</nav>

<section class="hero">
    <h1>NET<span>PULSE</span></h1>
    <p style="font-family: sans-serif; text-transform: none; margin-top: 20px; color: #aaa;">
        УПРАВЛЯЙ СВОИМ КОНТЕНТОМ. ПОЛУЧАЙ 60% ПРИБЫЛИ.
    </p>
    <div class="cta-box">
        <a href="https://netpulse.zite.so" class="btn-main">ЗАГРУЗИТЬ ТРЕК</a>
    </div>
</section>

<section class="grid">
    <div class="grid-item">
        <h2>ВЕСЬ МИР</h2>
        <p>SPOTIFY, APPLE MUSIC, VK, YANDEX И ЕЩЕ 150+ ПЛОЩАДОК ПОД ТВОИМ КОНТРОЛЕМ.</p>
    </div>
    <div class="grid-item">
    </div>
    <div class="grid-item">
    </div>
</section>

<footer>
    NETPULSE DISTRIBUTION &copy; 2026 
</footer>

</body>
</html>
